<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Panier')}"/>
</head>
<body>
<div class="site-shell">
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main>
  <div class="container">
    <div class="section-label">// MON PANIER</div>
    <div class="section-title">Panier</div>

    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <div th:if="${apiPanier != null}">
      <div th:if="${apiPanier.lignes() == null or #lists.isEmpty(apiPanier.lignes())}" style="text-align:center;padding:5rem 2rem">
        <div style="font-size:5rem;margin-bottom:1.5rem;opacity:0.3">🛒</div>
        <div style="font-family:var(--font-head);letter-spacing:3px;color:var(--text-dim);margin-bottom:2rem">Votre panier est vide</div>
        <a class="btn btn-primary" th:href="@{/catalogue}">Voir le catalogue</a>
      </div>

      <div class="cart-layout" th:if="${apiPanier.lignes() != null and !#lists.isEmpty(apiPanier.lignes())}">
        <div>
          <div class="cart-item" th:each="item : ${apiPanier.lignes()}">
            <div class="cart-item-img">
              <img th:if="${item.imageUrl() != null}" th:src="${#strings.replace(@environment.getProperty('api.base-url'), '/api/v1', '') + item.imageUrl()}" th:alt="${item.nomCommercial()}" style="width:100%;height:100%;object-fit:cover"/>
              <span th:if="${item.imageUrl() == null}">🎮</span>
            </div>
            <div class="cart-item-info">
              <div class="cart-item-name" th:text="${item.nomCommercial()}"></div>
              <div class="cart-item-meta">
                <form th:action="@{/panier/quantite}" method="post" style="display:inline-flex;align-items:center;gap:0.5rem">
                  <input type="hidden" name="produitId" th:value="${item.idVariant()}"/>
                  <input type="hidden" name="idLigne" th:value="${item.id()}"/>
                  <button type="button" class="btn btn-sm btn-secondary" onclick="changeQty(this.nextElementSibling, -1);this.closest('form').submit()" style="padding:0.2rem 0.6rem">−</button>
                  <input type="number" name="quantite" th:value="${item.quantite()}" class="form-control" min="1" max="99" style="width:60px;text-align:center;padding:0.2rem 0.5rem"/>
                  <button type="button" class="btn btn-sm btn-primary" onclick="changeQty(this.previousElementSibling, 1);this.closest('form').submit()" style="padding:0.2rem 0.6rem">+</button>
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                </form>
              </div>
            </div>
            <div class="cart-item-price">
              <span th:text="${#numbers.formatDecimal(item.montantLigne(), 1, 2)} + ' €'"></span>
              <div class="cart-item-garantie"
                   th:if="${item.garantieLabel() != null and item.garantiePrix() != null}">
                <span class="cart-garantie-icon">🛡</span>
                <span th:text="${item.garantieLabel()}"></span>
                <span th:text="${'+' + #numbers.formatDecimal(item.garantiePrix(), 1, 2) + ' €'}"></span>
              </div>
            </div>
            <form th:action="@{/panier/retirer}" method="post" style="margin:0">
              <input type="hidden" name="produitId" th:value="${item.idVariant()}"/>
              <input type="hidden" name="idLigne" th:value="${item.id()}"/>
              <button type="submit" style="background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;transition:color 0.2s">✕</button>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
          </div>

          <form th:action="@{/panier/vider}" method="post" style="margin-top:1rem">
            <button type="submit" class="btn btn-secondary btn-sm">Vider le panier</button>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </form>
        </div>

        <div class="cart-summary card-accent-top">
          <div style="font-family:var(--font-head);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
            Récapitulatif
          </div>
          <div class="summary-row"><span>Articles</span><span th:text="${#numbers.formatDecimal(apiPanier.sousTotal(),1,2) + ' €'}"></span></div>
          <div class="summary-row"><span>Remise</span><span th:text="${#numbers.formatDecimal(apiPanier.remise(),1,2) + ' €'}"></span></div>
          <th:block th:each="item : ${apiPanier.lignes()}" th:if="${item.garantieLabel() != null and item.garantiePrix() != null}">
            <div class="summary-row summary-row-garantie">
              <span>🛡 <span th:text="${item.garantieLabel()}"></span></span>
              <span th:text="${#numbers.formatDecimal(item.garantiePrix(), 1, 2) + ' €'}"></span>
            </div>
          </th:block>
          <div class="summary-row total"><span>Total</span><span th:text="${#numbers.formatDecimal(apiPanier.total(), 1, 2) + ' €'}"></span></div>
          <a class="btn btn-primary btn-full" th:href="@{/panier/checkout}" style="margin-top:1rem">Passer au checkout</a>
          <div style="margin-top:0.75rem;font-size:0.8rem;color:var(--text-dim)">Paiement fictif, facturation réelle côté projet.</div>
        </div>
      </div>
    </div>

    <div th:if="${apiPanier == null}">
      <div th:if="${panier == null or panier.isEmpty()}" style="text-align:center;padding:5rem 2rem">
        <div style="font-size:5rem;margin-bottom:1.5rem;opacity:0.3">🛒</div>
        <div style="font-family:var(--font-head);letter-spacing:3px;color:var(--text-dim);margin-bottom:2rem">Votre panier est vide</div>
        <a class="btn btn-primary" th:href="@{/catalogue}">Voir le catalogue</a>
      </div>

      <div class="cart-layout" th:if="${panier != null and !panier.isEmpty()}">
        <div>
          <div class="cart-item" th:each="item : ${panier}">
            <div class="cart-item-img">🎮</div>
            <div class="cart-item-info">
              <div class="cart-item-name" th:text="${item.nom}"></div>
              <div class="cart-item-meta">
                <form th:action="@{/panier/quantite}" method="post" style="display:inline-flex;align-items:center;gap:0.5rem">
                  <input type="hidden" name="produitId" th:value="${item.produitId}"/>
                  <button type="button" class="btn btn-sm btn-secondary" onclick="changeQty(this.nextElementSibling, -1);this.closest('form').submit()" style="padding:0.2rem 0.6rem">−</button>
                  <input type="number" name="quantite" th:value="${item.quantite}" class="form-control" min="1" max="99" style="width:60px;text-align:center;padding:0.2rem 0.5rem"/>
                  <button type="button" class="btn btn-sm btn-primary" onclick="changeQty(this.previousElementSibling, 1);this.closest('form').submit()" style="padding:0.2rem 0.6rem">+</button>
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                </form>
              </div>
            </div>
            <div class="cart-item-price">
              <span th:text="${#numbers.formatDecimal(item.prix * item.quantite, 1, 2)} + ' €'"></span>
              <div class="cart-item-garantie"
                   th:if="${item.garantieLabel != null and item.garantiePrix != null}">
                <span class="cart-garantie-icon">🛡</span>
                <span th:text="${item.garantieLabel}"></span>
                <span th:text="${'+' + #numbers.formatDecimal(item.garantiePrix, 1, 2) + ' €'}"></span>
              </div>
            </div>
            <form th:action="@{/panier/retirer}" method="post" style="margin:0">
              <input type="hidden" name="produitId" th:value="${item.produitId}"/>
              <button type="submit" style="background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;transition:color 0.2s">✕</button>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
          </div>

          <form th:action="@{/panier/vider}" method="post" style="margin-top:1rem">
            <button type="submit" class="btn btn-secondary btn-sm">Vider le panier</button>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </form>
        </div>

        <div class="cart-summary card-accent-top">
          <div style="font-family:var(--font-head);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
            Récapitulatif
          </div>
          <div class="summary-row"><span>Articles (<span th:text="${totalQuantite}">0</span>)</span><span th:text="${#numbers.formatDecimal(totalPrix, 1, 2)} + ' €'"></span></div>
          <th:block th:each="item : ${panier}" th:if="${item.garantieLabel != null and item.garantiePrix != null}">
            <div class="summary-row summary-row-garantie">
              <span>🛡 <span th:text="${item.garantieLabel}"></span></span>
              <span th:text="${#numbers.formatDecimal(item.garantiePrix, 1, 2)} + ' €'"></span>
            </div>
          </th:block>
          <div class="summary-row"><span>Livraison</span><span style="color:var(--success)">Gratuite</span></div>
          <div class="summary-row total"><span>Total</span><span th:text="${#numbers.formatDecimal(totalPrix, 1, 2)} + ' €'"></span></div>
          <form th:action="@{/panier/valider}" method="post" style="margin-top:1rem">
            <button type="submit" class="btn btn-primary btn-full">Valider la commande</button>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"/>
</div>
</body>
</html>

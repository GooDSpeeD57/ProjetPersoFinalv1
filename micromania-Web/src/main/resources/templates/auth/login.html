<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Connexion')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
  <div class="container-sm" style="padding-top:3rem">

    <div class="card card-accent-top">
      <div class="card-header">// CONNEXION</div>
      <div class="card-body">

        <div th:if="${param.error}" class="alert alert-error">
          Email ou mot de passe incorrect.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
          Vous avez été déconnecté.
        </div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/auth/login}" method="post">

          <div class="form-group">
            <label class="form-label" for="username">Email</label>
            <input class="form-control" type="email" id="username" name="username"
                   placeholder="votre@email.com" required autofocus/>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Mot de passe</label>
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="••••••••" required/>
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
            Connexion
          </button>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-dim)">
          Pas encore de compte ?
          <a th:href="@{/auth/inscription}">Créer un compte</a>
        </p>
      </div>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Inscription')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
  <div class="container-sm" style="padding-top:2rem">

    <div class="card card-accent-top">
      <div class="card-header">// CRÉER UN COMPTE</div>
      <div class="card-body">

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/auth/inscription}" method="post" th:object="${inscriptionForm}" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="nom">Nom</label>
              <input class="form-control" type="text" id="nom" name="nom"
                     th:value="${inscriptionForm?.nom}"
                     th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'"
                     placeholder="Dupont" required/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="prenom">Prénom</label>
              <input class="form-control" type="text" id="prenom" name="prenom"
                     th:value="${inscriptionForm?.prenom}"
                     th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'"
                     placeholder="Jean" required/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="pseudo">Pseudo</label>
            <input class="form-control" type="text" id="pseudo" name="pseudo"
                   th:value="${inscriptionForm?.pseudo}"
                   th:classappend="${#fields.hasErrors('pseudo')} ? 'is-invalid'"
                   placeholder="GamerXX" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('pseudo')}" th:errors="*{pseudo}"></div>
            <div class="form-text">Lettres, chiffres, _ ou - (3-50 caractères)</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email"
                   th:value="${inscriptionForm?.email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="votre@email.com" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="motDePasse">Mot de passe</label>
            <input class="form-control" type="password" id="motDePasse" name="motDePasse"
                   th:classappend="${#fields.hasErrors('motDePasse')} ? 'is-invalid'"
                   placeholder="Min. 8 caractères" required/>
            <div class="password-strength">
              <div class="strength-bar" id="strength-1"></div>
              <div class="strength-bar" id="strength-2"></div>
              <div class="strength-bar" id="strength-3"></div>
              <div class="strength-bar" id="strength-4"></div>
            </div>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('motDePasse')}" th:errors="*{motDePasse}"></div>
            <div class="form-text">Minimum 8 caractères</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="telephone">Téléphone</label>
            <input class="form-control" type="tel" id="telephone" name="telephone"
                   pattern="^(?:0[67][0-9]{8}|\+33[67][0-9]{8})$"
                   th:value="${inscriptionForm?.telephone}"
                   th:classappend="${#fields.hasErrors('telephone')} ? 'is-invalid'"
                   placeholder="0612345678 ou +33612345678" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="dateNaissance">Date de naissance</label>
            <input class="form-control" type="date" id="dateNaissance" name="dateNaissance"
                   th:value="${inscriptionForm?.dateNaissance}"
                   th:classappend="${#fields.hasErrors('dateNaissance')} ? 'is-invalid'"
                   required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"></div>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rgpdConsent" name="rgpdConsent"
                   th:checked="${inscriptionForm?.rgpdConsent}" required/>
            <label class="form-check-label" for="rgpdConsent">
              J'accepte que mes données soient utilisées conformément à la politique de confidentialité
              (<strong style="color:var(--accent)">RGPD</strong>)
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Créer mon compte
          </button>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-dim)">
          Déjà un compte ? <a th:href="@{/auth/login}">Se connecter</a>
        </p>
      </div>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>

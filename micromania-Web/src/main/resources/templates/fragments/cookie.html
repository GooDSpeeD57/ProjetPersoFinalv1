<div th:fragment="cookieBanner">
    <div id="cookie-banner" class="cookie-banner">
        <div class="cookie-content">
            <div class="cookie-text">
                <div class="cookie-title">COOKIES & TRACKING</div>
                <div class="cookie-desc">
                    Nous utilisons des cookies pour améliorer ton expérience, analyser le trafic et proposer du contenu personnalisé.
                </div>
            </div>

            <div class="cookie-actions">
                <button class="btn btn-secondary" onclick="refuseCookies()">Refuser</button>
                <button class="btn btn-primary" onclick="acceptCookies()">Accepter</button>
            </div>
        </div>
    </div>
</div>

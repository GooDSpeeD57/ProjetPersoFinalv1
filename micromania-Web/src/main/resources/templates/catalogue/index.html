<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Catalogue')}"/>
</head>
<body>
<div class="site-shell">
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main>
  <div class="container">

    <form id="filter-form" th:action="@{/catalogue}" method="get">
      <input type="hidden" name="page" value="0"/>
      <input type="hidden" name="univers" th:value="${univers}"/>

      <div class="h-filter-bar">

        <input class="form-control h-filter-search-input" type="text" name="q"
               th:value="${q}" placeholder="Rechercher un jeu, une console..."/>

        <th:block th:if="${!vueTcg}">
          <select class="form-control form-control-select h-filter-select"
                  name="plateforme" onchange="autoSubmitFilter()">
            <option value="" th:selected="${plateforme == null or plateforme.isBlank()}">Tous les supports</option>
            <option value="ps4"         th:selected="${plateforme == 'ps4'}">PS4</option>
            <option value="ps5"         th:selected="${plateforme == 'ps5'}">PS5</option>
            <option value="xbox"        th:selected="${plateforme == 'xbox'}">Xbox / Xbox One</option>
            <option value="xbox-series" th:selected="${plateforme == 'xbox-series'}">Xbox Series X</option>
            <option value="switch"      th:selected="${plateforme == 'switch'}">Switch</option>
            <option value="switch2"     th:selected="${plateforme == 'switch2'}">Switch 2</option>
            <option value="pc"          th:selected="${plateforme == 'pc'}">PC</option>
          </select>

          <select class="form-control form-control-select h-filter-select"
                  name="famille" onchange="autoSubmitFilter()">
            <option value="" th:selected="${famille == null or famille.isBlank()}">Tous les types</option>
            <option value="jeux"          th:selected="${famille == 'jeux'}">Jeux</option>
            <option value="consoles"      th:selected="${famille == 'consoles'}">Consoles</option>
            <option value="accessoires"   th:selected="${famille == 'accessoires'}">Accessoires</option>
            <option value="cartes-cadeau" th:selected="${famille == 'cartes-cadeau'}">Cartes Cadeau</option>
          </select>

          <select class="form-control form-control-select h-filter-select"
                  name="etat" onchange="autoSubmitFilter()" th:if="${!vueOccasion and !vueJeuxVideo}">
            <option value="" th:selected="${etat == null or etat.isBlank()}">Neuf &amp; Occasion</option>
            <option value="neuf"     th:selected="${etat == 'neuf'}">Neuf</option>
            <option value="occasion" th:selected="${etat == 'occasion'}">Occasion</option>
            <option value="location" th:selected="${etat == 'location'}">Location</option>
          </select>

          <select class="form-control form-control-select h-filter-select"
                  name="edition" onchange="autoSubmitFilter()" th:if="${editions != null and !editions.isEmpty()}">
            <option value="" th:selected="${edition == null or edition.isBlank()}">Toutes les éditions</option>
            <option th:each="ed : ${editions}"
                    th:value="${ed.code()}"
                    th:text="${ed.libelle()}"
                    th:selected="${edition == ed.code()}"></option>
          </select>
        </th:block>

        <th:block th:if="${vueTcg}">
          <select class="form-control form-control-select h-filter-select"
                  name="licence" onchange="autoSubmitFilter()">
            <option value="" th:selected="${licence == null or licence.isBlank()}">Toutes les licences</option>
            <option value="pokemon" th:selected="${licence == 'pokemon'}">Pokémon</option>
            <option value="yugioh"  th:selected="${licence == 'yugioh'}">Yu-Gi-Oh!</option>
            <option value="magic"   th:selected="${licence == 'magic'}">Magic</option>
            <option value="lorcana" th:selected="${licence == 'lorcana'}">Lorcana</option>
          </select>
          <select class="form-control form-control-select h-filter-select"
                  name="format" onchange="autoSubmitFilter()">
            <option value="" th:selected="${format == null or format.isBlank()}">Tous les formats</option>
            <option value="boosters"    th:selected="${format == 'boosters'}">Boosters</option>
            <option value="coffrets"    th:selected="${format == 'coffrets'}">Coffrets</option>
            <option value="accessoires" th:selected="${format == 'accessoires'}">Accessoires</option>
          </select>
        </th:block>

        <select class="form-control form-control-select h-filter-select"
                name="tri" onchange="autoSubmitFilter()">
          <option value="" th:selected="${tri == null or tri.isBlank()}">Trier par</option>
          <option value="nouveautes" th:selected="${tri == 'nouveautes'}">Nouveautés</option>
          <option value="prix_asc"   th:selected="${tri == 'prix_asc'}">Prix croissant</option>
          <option value="prix_desc"  th:selected="${tri == 'prix_desc'}">Prix décroissant</option>
          <option value="note"       th:selected="${tri == 'note'}">Meilleure note</option>
          <option value="ventes"     th:selected="${tri == 'ventes'}">Top des ventes</option>
          <option value="sortie_desc" th:selected="${tri == 'sortie_desc'}">Date de sortie (récent → ancien)</option>
          <option value="sortie_asc"  th:selected="${tri == 'sortie_asc'}">Date de sortie (ancien → récent)</option>
        </select>

        <a th:if="${resetVersUnivers != null}"
           th:href="@{/catalogue(univers=${resetVersUnivers})}"
           class="btn btn-secondary btn-sm" style="white-space:nowrap">Réinitialiser</a>
        <a th:unless="${resetVersUnivers != null}"
           th:href="@{/catalogue}"
           class="btn btn-secondary btn-sm" style="white-space:nowrap">Réinitialiser</a>

      </div>
    </form>

    <div class="products-grid" th:if="${produits != null and produits.content() != null and !produits.content().isEmpty()}">
      <th:block th:each="p : ${produits.content()}">

        <!-- 1 carte = 1 variant -->
        <div class="product-card"
             th:attr="data-href=@{/catalogue/{id}(id=${p.idProduit()},v=${p.id()})}">

          <!-- Badge état -->
          <div th:if="${p.statutProduit() != null}"
               th:classappend="${'OCCASION'.equalsIgnoreCase(p.statutProduit())} ? 'product-etat-banner banner-occasion' : 'product-etat-banner banner-neuf'"
               th:text="${'OCCASION'.equalsIgnoreCase(p.statutProduit()) ? 'Occasion' : p.statutProduit()}"></div>

          <div class="product-img">
            <img th:if="${p.imageUrl() != null}"
                 th:src="${#strings.replace(@environment.getProperty('api.base-url'), '/api/v1', '') + p.imageUrl()}"
                 th:alt="${p.imageAlt() != null ? p.imageAlt() : p.nom()}"
                 onerror="this.style.display='none'"/>
            <span th:if="${p.imageUrl() == null}">🎮</span>
            <span th:if="${p.misEnAvant()}"   class="product-badge badge-premium">Mise en avant</span>
            <span th:if="${p.estPreCommande()}" class="product-badge badge-precommande">Précommande</span>
          </div>

          <div class="product-body">
            <!-- Plateforme + édition comme sous-titre -->
            <div class="product-platform">
              <span th:text="${p.plateforme() != null ? p.plateforme() : p.categorie()}"></span>
              <span th:if="${p.edition() != null and !p.edition().isBlank()}"
                    style="color:var(--text-dim);font-size:.8em;" th:text="' · ' + ${p.edition()}"></span>
            </div>
            <div class="product-name" th:text="${p.nom()}"></div>

            <div class="product-rating" th:if="${p.noteMoyenne() != null and p.nbAvis() > 0}">
              <div class="rating-stars" aria-hidden="true">
                <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                  <span th:text="${i <= T(java.lang.Math).round(p.noteMoyenne()) ? '★' : '☆'}"></span>
                </th:block>
              </div>
              <span class="rating-meta"
                    th:text="${#numbers.formatDecimal(p.noteMoyenne(),1,1) + ' / 5 · ' + p.nbAvis() + ' avis'}"></span>
            </div>
            <div class="product-rating product-rating-empty"
                 th:if="${p.noteMoyenne() == null or p.nbAvis() == 0}">Pas encore d'avis</div>

            <div class="product-price">
              <span th:if="${p.prix() != null}"
                    th:text="${#numbers.formatDecimal(p.prix(),1,2) + ' €'}"></span>
              <span th:if="${p.prix() == null}" style="color:var(--text-dim);font-size:.85em">Prix non renseigné</span>
            </div>

            <div class="product-actions" onclick="event.stopPropagation()">
              <form th:action="@{/panier/ajouter}" method="post">
                <input type="hidden" name="produitId"  th:value="${p.idProduit()}"/>
                <input type="hidden" name="produitNom" th:value="${p.nom()}"/>
                <input type="hidden" name="idVariant"  th:value="${p.id()}"/>
                <button type="submit" class="btn btn-sm btn-primary">+ Panier</button>
              </form>
              <a class="btn btn-sm btn-secondary" th:href="@{/catalogue/{id}(id=${p.idProduit()})}">Détail</a>
            </div>
          </div>
        </div>

      </th:block>
    </div>

    <div th:if="${produits == null or produits.content() == null or produits.content().isEmpty()}"
         style="text-align:center;padding:4rem;color:var(--text-dim)">
      <div style="font-family:var(--font-head);letter-spacing:3px">Aucun produit trouvé</div>
    </div>

    <div class="pagination" th:if="${produits != null and produits.totalPages() > 1}">
      <a class="page-link" th:classappend="${produits.first()} ? 'disabled'"
         th:href="@{/catalogue(page=${produits.number() - 1}, q=${q}, categorie=${categorie}, niveau=${niveau}, univers=${univers}, plateforme=${plateforme}, famille=${famille}, etat=${etat}, licence=${licence}, format=${format}, tri=${tri})}">◀</a>
      <th:block th:each="i : ${#numbers.sequence(0, produits.totalPages() - 1)}">
        <a class="page-link" th:classappend="${i == produits.number()} ? 'active'"
           th:href="@{/catalogue(page=${i}, q=${q}, categorie=${categorie}, niveau=${niveau}, univers=${univers}, plateforme=${plateforme}, famille=${famille}, etat=${etat}, licence=${licence}, format=${format}, tri=${tri})}"
           th:text="${i + 1}"></a>
      </th:block>
      <a class="page-link" th:classappend="${produits.last()} ? 'disabled'"
         th:href="@{/catalogue(page=${produits.number() + 1}, q=${q}, categorie=${categorie}, niveau=${niveau}, univers=${univers}, plateforme=${plateforme}, famille=${famille}, etat=${etat}, licence=${licence}, format=${format}, tri=${tri})}">▶</a>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"/>
</div>
</body>
</html>

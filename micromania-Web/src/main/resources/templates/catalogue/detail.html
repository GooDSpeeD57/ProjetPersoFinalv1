<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head(${produit != null && produit.nom() != null ? produit.nom() : 'Produit'})}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<th:block th:replace="~{fragments/layout :: alerts}"/>
<main>
  <div class="container product-detail-container">
    <a th:href="@{/catalogue}" class="product-detail-backlink">
      ◀ RETOUR AU CATALOGUE
    </a>

    <div th:if="${produit == null}" class="alert alert-error">Produit introuvable.</div>

    <div th:if="${produit != null}" class="product-detail-layout">
      <div class="card product-detail-media-card">
        <div class="product-detail-image-wrap">
          <img th:if="${produit.images() != null and !#lists.isEmpty(produit.images())}"
               th:src="${'http://localhost:8080' + produit.images().get(0).url()}"
               th:alt="${produit.images().get(0).alt() != null ? produit.images().get(0).alt() : produit.nom()}"
               class="product-detail-image"/>
          <span th:unless="${produit.images() != null and !#lists.isEmpty(produit.images())}">🎮</span>
        </div>
      </div>

      <div>
        <div class="section-label" th:text="${produit.categorie() != null && produit.categorie().description() != null ? produit.categorie().description() : 'CATALOGUE'}"></div>
        <h1 class="product-detail-title" th:text="${produit.nom()}"></h1>

        <div id="prixAffiche"
             class="product-detail-price"
             th:text="${produit.variants() != null and !#lists.isEmpty(produit.variants()) and produit.variants().get(0).prixWeb() != null ? #numbers.formatDecimal(produit.variants().get(0).prixWeb(),1,2) + ' €' : 'N/A'}">
        </div>

        <p class="product-detail-description" th:text="${produit.description() != null ? produit.description() : 'Aucune description disponible.'}"></p>

        <div class="info-row" th:if="${produit.editeur() != null}">
          <span class="label">Éditeur</span>
          <span th:text="${produit.editeur()}"></span>
        </div>
        <div class="info-row" th:if="${produit.pegi() != null}">
          <span class="label">PEGI</span>
          <span th:text="${produit.pegi()} + '+'"></span>
        </div>
        <div class="info-row" th:if="${produit.niveauAccesMin() != null}">
          <span class="label">Accès</span>
          <span th:text="${produit.niveauAccesMin()}"></span>
        </div>

        <form th:if="${produit.variants() != null and !#lists.isEmpty(produit.variants())}"
              th:action="@{/panier/ajouter}"
              method="post"
              class="product-detail-form">

          <input type="hidden" name="produitId" th:value="${produit.id()}"/>
          <input type="hidden" name="produitNom" th:value="${produit.nom()}"/>

          <label for="idVariant" class="product-detail-label">Version</label>

          <select id="idVariant" name="idVariant" class="product-detail-select">
            <option th:each="variant : ${produit.variants()}"
                    th:value="${variant.id()}"
                    th:data-prix="${variant.prixWeb()}"
                    th:text="${(variant.plateforme() != null ? variant.plateforme().libelle() : 'Standard')
                              + ' - '
                              + (variant.statutProduit() != null ? variant.statutProduit() : 'N/A')
                              + ' - '
                              + (variant.prixWeb() != null ? #numbers.formatDecimal(variant.prixWeb(),1,2) + ' €' : 'N/A')}">
            </option>
          </select>

          <input type="hidden" name="prix" id="prixHidden"
                 th:value="${produit.variants().get(0).prixWeb()}"/>

          <button type="submit" class="btn btn-primary">🛒 Ajouter au panier</button>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const select = document.getElementById("idVariant");
    const prixHidden = document.getElementById("prixHidden");
    const prixAffiche = document.getElementById("prixAffiche");

    if (!select) return;

    function syncVariant() {
      const option = select.options[select.selectedIndex];
      const prix = option ? option.getAttribute("data-prix") : null;

      if (prixHidden) {
        prixHidden.value = prix || "";
      }

      if (prixAffiche) {
        prixAffiche.textContent = prix ? (Number(prix).toFixed(2) + " €") : "N/A";
      }
    }

    syncVariant();
    select.addEventListener("change", syncVariant);
  });
</script>
</body>
</html>

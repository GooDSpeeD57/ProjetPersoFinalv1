spring:
  application:
    name: micromania-api

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/Micromania?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true}
    username: ${DB_USER:MISSING_DB_USER_SET_ENV_VAR}
    password: ${DB_PASSWORD:MISSING_DB_PASSWORD_SET_ENV_VAR}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 16

  sql:
    init:
      mode: never

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

app:
  media:
    images-path: ${APP_IMAGES_PATH:C:/Users/GooDSpeeD/Desktop/Projet final v1/.claude/worktrees/sad-cori/media/images}
  jwt:
    secret: ${JWT_SECRET:MISSING_JWT_SECRET_SET_ENV_VAR_MIN_32_CHARS_______________________}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}
  remember-me:
    validity-days: ${REMEMBER_ME_VALIDITY_DAYS:30}

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    fr.micromania: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/Micromania?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
    username: root
    password: Root

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: dev-secret-key-micromania-minimum-32-chars-dev-only
    expiration-ms: 86400000

logging:
  level:
    fr.micromania: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50

  jpa:
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    fr.micromania: WARN
    root: ERROR
